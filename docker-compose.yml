# ──────────────────────────────────────────────────────────────
# Zorvyn Fintech - Docker Compose
# Services: FastAPI App + PostgreSQL
# ──────────────────────────────────────────────────────────────

version: "3.9"

services:
  # ── PostgreSQL Database ──────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: zorvyn-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD:Deepak@2005
      POSTGRES_DB: finance_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d finance_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Application ──────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zorvyn-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://zorvyn_user:zorvyn_secret@db:5432/finance_db
      SECRET_KEY: c4f2e8a1b9d3f7e6a5c8b2d1e4f7a3b6c9d2e5f8a1b4c7d0e3f6a9b2c5d8e1
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      RATE_LIMIT: 100/minute
      ENV: development
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: admin123
      ADMIN_NAME: System Admin
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
        echo 'Waiting for database...' &&
        sleep 2 &&
        echo 'Running migrations...' &&
        alembic upgrade head &&
        echo 'Seeding database...' &&
        python -m app.seed &&
        echo 'Starting server...' &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

volumes:
  postgres_data:
    driver: local
